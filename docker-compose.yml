services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: prod-bot-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: prod-bot-frontend
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - prod-bot-node-modules:/app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://api:8000

volumes:
  prod-bot-node-modules: